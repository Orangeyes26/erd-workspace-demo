<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>eRD Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
:root {
    /* ---- eRD AI Chat tokens (Ant Design v5 daybreak blue) ---- */
    --erd-blue-1:#e6f4ff; --erd-blue-2:#bae0ff; --erd-blue-3:#91caff; --erd-blue-4:#69b1ff;
    --erd-blue-5:#4096ff; --erd-blue-6:#1677ff; --erd-blue-7:#0958d9; --erd-blue-8:#003eb3;
    --erd-blue-9:#002c8c; --erd-blue-10:#001d66;
    --erd-color-primary:var(--erd-blue-6);
    --erd-color-primary-bg:var(--erd-blue-1);
    --erd-color-primary-bg-hover:var(--erd-blue-2);
    --erd-color-primary-border:var(--erd-blue-3);
    --erd-color-primary-border-hover:var(--erd-blue-4);
    --erd-color-primary-hover:var(--erd-blue-5);
    --erd-color-primary-active:var(--erd-blue-7);
    --erd-color-success:#52c41a; --erd-color-success-bg:#f6ffed; --erd-color-success-border:#b7eb8f;
    --erd-color-warning:#faad14; --erd-color-warning-bg:#fffbe6; --erd-color-warning-border:#ffe58f;
    --erd-color-error:#ff4d4f; --erd-color-error-bg:#fff2f0; --erd-color-error-border:#ffccc7;
    --erd-color-info:var(--erd-blue-6); --erd-color-link:var(--erd-blue-6);
    --erd-color-text:rgba(0,0,0,0.88);
    --erd-color-text-secondary:rgba(0,0,0,0.65);
    --erd-color-text-tertiary:rgba(0,0,0,0.45);
    --erd-color-text-quaternary:rgba(0,0,0,0.25);
    --erd-color-fill:rgba(0,0,0,0.15);
    --erd-color-fill-secondary:rgba(0,0,0,0.06);
    --erd-color-fill-tertiary:rgba(0,0,0,0.04);
    --erd-color-fill-quaternary:rgba(0,0,0,0.02);
    --erd-color-bg-base:#fff; --erd-color-bg-container:#fff; --erd-color-bg-elevated:#fff;
    --erd-color-bg-layout:#f5f5f5; --erd-color-bg-mask:rgba(0,0,0,0.45);
    --erd-color-border:#d9d9d9; --erd-color-border-secondary:#f0f0f0;
    --erd-bubble-user-bg:var(--erd-blue-6); --erd-bubble-user-text:#fff;
    --erd-bubble-ai-bg:var(--erd-color-fill-tertiary); --erd-bubble-ai-text:var(--erd-color-text);
    --erd-bubble-radius:16px;
    --erd-font-family:"IBM Plex Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif;
    --erd-font-family-code:"IBM Plex Mono","SFMono-Regular",Consolas,"Liberation Mono",Menlo,Courier,monospace;
    --erd-font-size-sm:12px; --erd-font-size-base:14px; --erd-font-size-lg:16px;
    --erd-font-weight-medium:500; --erd-font-weight-strong:600;
    --erd-radius-xs:2px; --erd-radius-sm:4px; --erd-radius:6px; --erd-radius-lg:8px;
    --erd-radius-xl:16px; --erd-radius-pill:999px;
    --erd-shadow-tertiary:0 1px 2px 0 rgba(0,0,0,0.03),0 1px 6px -1px rgba(0,0,0,0.02),0 2px 4px 0 rgba(0,0,0,0.02);
    --erd-shadow-composer:0 2px 12px rgba(0,0,0,0.06);
    --erd-motion-mid:0.2s cubic-bezier(0.645,0.045,0.355,1);

    /* ---- eRD Charting tokens (IBM Plex + Ant palette) ---- */
    --font-sans:"IBM Plex Sans",ui-sans-serif,system-ui,-apple-system,sans-serif;
    --font-mono:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,monospace;
    --text-2xs:10px; --text-xs:11px; --text-sm:12px; --text-base:13px; --text-md:15px;
    --text-lg:18px; --text-xl:22px; --text-2xl:28px; --text-3xl:36px; --text-4xl:48px;
    --weight-regular:400; --weight-medium:500; --weight-semibold:600; --weight-bold:700;
    --tracking-caps:0.06em;
    --space-1:2px; --space-2:4px; --space-3:6px; --space-4:8px; --space-5:12px; --space-6:16px;
    --radius-md:6px; --hairline:1px;
    --surface-card:#fff; --border-subtle:#f0f0f0;
    --text-primary:rgba(0,0,0,0.88); --text-secondary:rgba(0,0,0,0.65); --text-muted:rgba(0,0,0,0.45);
    --signal-pass:#52c41a; --signal-fail:#ff4d4f; --signal-warn:#faad14;
    --shadow-sm:0 1px 2px rgba(19,25,32,0.06),0 1px 1px rgba(19,25,32,0.04);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:var(--erd-font-family);color:var(--erd-color-text);background:var(--erd-color-bg-layout)}
  #root{height:100%}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.14);border-radius:5px}
  ::-webkit-scrollbar-track{background:transparent}
  .erd-navrow:hover{background:var(--erd-color-fill-tertiary)!important}
  .erd-tile:hover{border-color:var(--erd-color-primary-border)!important;box-shadow:0 2px 8px rgba(0,0,0,.06)!important}
  .erd-icon-btn:hover{box-shadow:inset 0 0 0 999px rgba(0,0,0,.05)!important}
  .erd-fav-remove:hover{color:var(--erd-color-error)!important;background:var(--erd-color-error-bg)!important}
  .erd-star:hover{transform:scale(1.15)}
  .erd-prompt:hover{background:var(--erd-color-fill-tertiary)!important;border-color:var(--erd-color-primary-border)!important}
  .erd-spin{display:inline-block;animation:erd-rot 1s linear infinite}
  textarea,input{font-family:inherit}
  @keyframes erd-rot{to{transform:rotate(360deg)}}
  @keyframes erd-tc-spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"><div id="__boot" style="font-family:system-ui,-apple-system,sans-serif;color:#8c8c8c;padding:40px;font-size:14px">Loading eRD Workspace…</div></div>
<noscript><div style="font-family:system-ui,sans-serif;color:#b00020;padding:40px;font-size:14px">This demo needs JavaScript enabled. Please open it in Chrome, Edge, Firefox, or Safari with JavaScript on.</div></noscript>
<script>
"use strict";
window.addEventListener('error', function(ev){
  var r = document.getElementById('root');
  if (r && r.getAttribute('data-mounted') !== '1') {
    r.innerHTML = '<pre style="padding:24px;margin:0;color:#b00020;background:#fff;white-space:pre-wrap;font:13px/1.6 ui-monospace,Menlo,monospace">eRD Workspace could not start:\n\n' + ((ev && (ev.message || ev.error)) || 'unknown error') + '\n\nThis is usually an old browser. Please open the file in an up-to-date Chrome, Edge, Firefox, or Safari.</pre>';
  }
});
const h = React.createElement;
const F = React.Fragment;

/* Parse a CSS text string ("a:b;c:d") into a React style object so the
   prototype's inline-style strings port near-verbatim. */
function css(str){
  if (str && typeof str === 'object') return str;
  const o = {};
  String(str || '').split(';').forEach(part => {
    const s = part.trim(); if (!s) return;
    const i = s.indexOf(':'); if (i < 0) return;
    let k = s.slice(0, i).trim(), v = s.slice(i + 1).trim();
    k = k.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
    o[k] = v;
  });
  return o;
}
function Icon(icon, style){ return h('iconify-icon', style ? { icon, style: css(style) } : { icon }); }

/* ---------------- ECharts wrapper + eRD theme ---------------- */
let _erdThemeReg = false;
function ensureErdTheme(){
  if (_erdThemeReg || !window.echarts) return;
  const grid = '#f0f0f0', axis = '#d9d9d9', axisLabel = 'rgba(0,0,0,0.45)', title = 'rgba(0,0,0,0.88)';
  const sans = "'IBM Plex Sans', sans-serif", mono = "'IBM Plex Mono', monospace";
  const axisCommon = {
    axisLine: { lineStyle: { color: axis } },
    axisTick: { lineStyle: { color: axis }, length: 4 },
    axisLabel: { color: axisLabel, fontFamily: mono, fontSize: 11 },
    splitLine: { lineStyle: { color: grid, type: 'solid' } },
    nameTextStyle: { color: axisLabel, fontFamily: sans, fontSize: 11 },
  };
  window.echarts.registerTheme('erd', {
    color: ['#5b8ff9','#61ddaa','#65789b','#f6bd16','#7262fd','#78d3f8','#9661bc','#f6903d','#008685'],
    backgroundColor: 'transparent',
    textStyle: { fontFamily: sans, fontSize: 12, color: axisLabel },
    title: { textStyle: { color: title, fontFamily: sans, fontWeight: 600, fontSize: 14 } },
    categoryAxis: axisCommon, valueAxis: axisCommon, logAxis: axisCommon, timeAxis: axisCommon,
    legend: { textStyle: { color: axisLabel, fontFamily: sans, fontSize: 12 }, icon: 'roundRect', itemWidth: 12, itemHeight: 8 },
    tooltip: { backgroundColor: 'rgba(0,0,0,0.85)', borderWidth: 0, padding: [8, 10], textStyle: { color: '#fff', fontFamily: mono, fontSize: 12 } },
    line: { symbol: 'circle', symbolSize: 5, lineStyle: { width: 2 }, smooth: false },
    bar: { itemStyle: { borderRadius: [2, 2, 0, 0] } },
  });
  _erdThemeReg = true;
}
function EChartR(props){
  const ref = React.useRef(null);
  const inst = React.useRef(null);
  React.useEffect(() => {
    let cancelled = false, ro = null;
    (function init(){
      if (cancelled) return;
      if (!window.echarts || !ref.current) { setTimeout(init, 60); return; }
      if (props.theme === 'erd') ensureErdTheme();
      const chart = window.echarts.init(ref.current, props.theme === 'erd' ? 'erd' : null);
      inst.current = chart;
      chart.setOption(props.option);
      ro = new ResizeObserver(() => chart && chart.resize());
      ro.observe(ref.current);
    })();
    return () => { cancelled = true; if (ro) ro.disconnect(); if (inst.current) { inst.current.dispose(); inst.current = null; } };
  }, []);
  React.useEffect(() => { if (inst.current) inst.current.setOption(props.option, true); }, [props.option]);
  return h('div', { ref, style: { width: '100%', height: props.height || 280 } });
}

/* ---------------- eRD Charting components ---------------- */
function StatTile(p){
  const toneColor = { neutral:'var(--text-primary)', pass:'var(--signal-pass)', fail:'var(--signal-fail)', warn:'var(--signal-warn)' }[p.tone || 'neutral'];
  const dir = p.deltaDirection || 'up';
  const arrow = dir === 'up' ? '▲' : dir === 'down' ? '▼' : '—';
  const deltaColor = dir === 'flat' ? 'var(--text-muted)' : (dir === 'up' ? 'var(--signal-pass)' : 'var(--signal-fail)');
  return h('div', { style: css('display:flex;flex-direction:column;gap:var(--space-3);padding:var(--space-6);background:var(--surface-card);border:var(--hairline) solid var(--border-subtle);border-radius:var(--radius-md);box-shadow:var(--shadow-sm);min-width:0') },
    h('span', { style: css('font-family:var(--font-sans);font-size:var(--text-2xs);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-muted)') }, p.label),
    h('div', { style: css('display:flex;align-items:baseline;gap:var(--space-3)') },
      h('span', { style: css("font-family:var(--font-mono);font-size:var(--text-3xl);font-weight:var(--weight-bold);line-height:1;color:" + toneColor + ";font-feature-settings:'tnum' 1") },
        p.value, p.unit ? h('span', { style: css('font-size:var(--text-lg);font-weight:var(--weight-medium);color:var(--text-muted);margin-left:2px') }, p.unit) : null)),
    p.delta != null ? h('span', { style: css('font-family:var(--font-mono);font-size:var(--text-xs);color:' + deltaColor + ';display:inline-flex;align-items:center;gap:4px') }, arrow + ' ' + p.delta) : null);
}
function buildLineOption(series, xData, markLines, area, yName){
  const ml = markLines && markLines.length ? { markLine: { silent: true, symbol: 'none', data: markLines.map(m => ({
    yAxis: m.y, lineStyle: { color: m.color || '#8c8c8c', type: m.type || 'dashed', width: 1.5 },
    label: { formatter: m.label || '', position: 'insideEndTop', fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: m.color },
  })) } } : {};
  return {
    animationDuration: 500,
    grid: { left: 8, right: 16, top: 34, bottom: 8, containLabel: true },
    legend: { top: 0, left: 0 },
    tooltip: { trigger: 'axis' },
    xAxis: { type: 'category', boundaryGap: false, data: xData, name: '', nameLocation: 'middle', nameGap: 26 },
    yAxis: { type: 'value', name: yName || '', scale: true },
    series: (series || []).map((s, i) => Object.assign({
      name: s.name, type: 'line', smooth: false,
      showSymbol: xData.length <= 40, data: s.data,
      lineStyle: s.color ? { color: s.color } : undefined,
      itemStyle: s.color ? { color: s.color } : undefined,
      areaStyle: area ? { opacity: 0.12 } : undefined,
    }, i === 0 ? ml : {})),
  };
}
function LineChartR(p){
  const option = React.useMemo(() => buildLineOption(p.series, p.xData, p.markLines, p.area, p.yName), [p.series, p.xData, p.markLines, p.area, p.yName]);
  return h(EChartR, { option, height: p.height || 280, theme: 'erd' });
}
function buildGaugeOption(p){
  const unit = p.unit || '', precision = p.precision || 0;
  return { series: [{
    type: 'gauge', min: p.min || 0, max: p.max || 100, startAngle: 210, endAngle: -30, radius: '92%',
    progress: { show: false },
    axisLine: { lineStyle: { width: 14, color: p.zones || [[0.6,'#ff4d4f'],[0.85,'#faad14'],[1,'#52c41a']] } },
    pointer: { width: 4, length: '62%', itemStyle: { color: '#141414' } },
    anchor: { show: true, size: 10, itemStyle: { color: '#141414' } },
    axisTick: { distance: -18, length: 5, lineStyle: { color: '#8c8c8c' } },
    splitLine: { distance: -18, length: 12, lineStyle: { color: '#8c8c8c' } },
    axisLabel: { distance: 18, fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: '#63707f' },
    title: { offsetCenter: [0, '26%'], fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 12, color: '#63707f' },
    detail: { valueAnimation: true, offsetCenter: [0, '-2%'], fontFamily: "'IBM Plex Mono', monospace", fontSize: 30, fontWeight: 700, color: '#141414', formatter: v => v.toFixed(precision) + unit },
    data: [{ value: p.value, name: p.label || '' }],
  }] };
}
function GaugeChartR(p){
  const option = React.useMemo(() => buildGaugeOption(p), [p.value, p.min, p.max, p.label, p.unit, p.precision]);
  return h(EChartR, { option, height: p.height || 240 });
}

/* ---------------- eRD AI Chat components ---------------- */
function Welcome(p){
  const surface = 'background:linear-gradient(97deg, var(--erd-blue-1) 0%, rgba(230,244,255,0.35) 100%);border:1px solid var(--erd-color-border-secondary)';
  return h('div', { style: css('display:flex;align-items:center;gap:16px;padding:16px 20px;border-radius:var(--erd-radius-lg);font-family:var(--erd-font-family);' + surface) },
    p.icon ? h('div', { style: css('width:44px;height:44px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--erd-color-primary)') }, p.icon) : null,
    h('div', { style: css('min-width:0;flex:1') },
      h('div', { style: css('display:flex;align-items:center;gap:8px;font-size:var(--erd-font-size-lg);font-weight:var(--erd-font-weight-strong);color:var(--erd-color-text)') }, p.title),
      p.description ? h('div', { style: css('font-size:var(--erd-font-size-base);color:var(--erd-color-text-secondary);margin-top:4px;line-height:1.55') }, p.description) : null));
}
function PromptItem(p){
  const it = p.item;
  return h('div', { className: 'erd-prompt', onClick: () => !it.disabled && p.onClick && p.onClick(it),
    style: css('display:flex;align-items:flex-start;gap:10px;flex:0 1 auto;max-width:320px;padding:12px 14px;border-radius:var(--erd-radius-lg);border:1px solid var(--erd-color-border-secondary);background:#fff;cursor:pointer;transition:all .15s') },
    it.icon ? h('span', { style: css('color:var(--erd-color-primary);font-size:18px;margin-top:1px;flex:none') }, it.icon) : null,
    h('div', { style: css('min-width:0') },
      h('div', { style: css('font-size:var(--erd-font-size-base);font-weight:var(--erd-font-weight-medium);color:var(--erd-color-text)') }, it.label),
      it.description ? h('div', { style: css('font-size:var(--erd-font-size-sm);color:var(--erd-color-text-tertiary);margin-top:2px;line-height:1.45') }, it.description) : null));
}
function Prompts(p){
  return h('div', { style: css('font-family:var(--erd-font-family)') },
    p.title ? h('div', { style: css('font-size:var(--erd-font-size-base);color:var(--erd-color-text-secondary);margin-bottom:12px') }, p.title) : null,
    h('div', { style: css('display:flex;flex-direction:row;flex-wrap:wrap;gap:12px') },
      (p.items || []).map((it, i) => h(PromptItem, { key: it.key || i, item: it, onClick: p.onItemClick }))));
}
function Bubble(p){
  const isEnd = p.placement === 'end';
  const surf = isEnd ? 'background:var(--erd-bubble-user-bg);color:var(--erd-bubble-user-text)' : 'background:var(--erd-bubble-ai-bg);color:var(--erd-bubble-ai-text)';
  return h('div', { style: css('display:flex;flex-direction:' + (isEnd ? 'row-reverse' : 'row') + ';align-items:flex-start;gap:12px;max-width:100%') },
    p.avatar,
    h('div', { style: css('display:flex;flex-direction:column;align-items:' + (isEnd ? 'flex-end' : 'flex-start') + ';min-width:0;gap:4px') },
      p.header ? h('div', { style: css('font-size:12px;color:var(--erd-color-text-tertiary);font-weight:500') }, p.header) : null,
      h('div', { style: css('max-width:100%;padding:10px 14px;border-radius:var(--erd-bubble-radius);font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word;' + surf) },
        p.loading
          ? h('span', { style: css('display:inline-flex;gap:4px;align-items:center;color:var(--erd-color-text-tertiary)') }, Icon('ant-design:loading-outlined', 'font-size:15px').props ? h('iconify-icon', { icon: 'ant-design:loading-outlined', className: 'erd-spin' }) : null, 'Thinking…')
          : p.content)));
}
const TC_STATUS = {
  pending: { icon: 'ant-design:clock-circle-outlined', color: 'var(--erd-color-text-quaternary)' },
  running: { icon: 'ant-design:loading-outlined', color: 'var(--erd-color-primary)', spin: true },
  success: { icon: 'ant-design:check-circle-fill', color: 'var(--erd-color-success)' },
  error: { icon: 'ant-design:close-circle-fill', color: 'var(--erd-color-error)' },
};
function ThoughtChain(p){
  const items = p.items || [];
  return h('div', { style: css('font-family:var(--erd-font-family)') },
    items.map((it, i) => {
      const st = TC_STATUS[it.status || 'pending'];
      const last = i === items.length - 1;
      return h('div', { key: it.key || i, style: css('display:flex;gap:12px') },
        h('div', { style: css('display:flex;flex-direction:column;align-items:center') },
          h('span', { className: st.spin ? 'erd-spin' : undefined, style: { width: 24, height: 24, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16, color: st.color } },
            h('iconify-icon', { icon: st.icon })),
          !last ? h('span', { style: css('flex:1;width:2px;background:var(--erd-color-border-secondary);margin:2px 0') }) : null),
        h('div', { style: { flex: 1, paddingBottom: last ? 0 : 16, minWidth: 0 } },
          h('div', { style: css('display:flex;align-items:center;gap:6px;min-height:24px') },
            h('span', { style: css('font-size:var(--erd-font-size-base);font-weight:var(--erd-font-weight-medium);color:var(--erd-color-text)') }, it.title)),
          it.description ? h('div', { style: css('font-size:var(--erd-font-size-sm);color:var(--erd-color-text-tertiary);margin-top:2px') }, it.description) : null));
    }));
}
function Sender(p){
  const [focused, setFocused] = React.useState(false);
  const taRef = React.useRef(null);
  const val = p.value || '';
  React.useEffect(() => { const ta = taRef.current; if (!ta) return; ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 160) + 'px'; }, [val]);
  const submit = () => { if (p.loading || p.disabled) return; const v = (val || '').trim(); if (!v) return; p.onSubmit && p.onSubmit(v); };
  return h('div', { style: css('display:flex;align-items:flex-end;gap:8px;padding:8px 8px 8px 14px;background:var(--erd-color-bg-container);border:1px solid ' + (focused ? 'var(--erd-color-primary)' : 'var(--erd-color-border)') + ';border-radius:var(--erd-radius-xl);box-shadow:var(--erd-shadow-composer);transition:border-color .15s') },
    h('textarea', { ref: taRef, value: val, placeholder: p.placeholder || 'Ask eRD anything…', rows: 1,
      onFocus: () => setFocused(true), onBlur: () => setFocused(false),
      onChange: e => p.onChange && p.onChange(e.target.value),
      onKeyDown: e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); } },
      style: css('flex:1;border:none;outline:none;resize:none;font-family:inherit;font-size:14px;line-height:1.5;color:var(--erd-color-text);max-height:160px;padding:6px 0;background:transparent') }),
